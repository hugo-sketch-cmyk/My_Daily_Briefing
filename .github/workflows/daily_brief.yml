name: Consultant Daily Briefing

on:
  schedule:
    # 1. 北京时间 (CST) 08:07 推送 -> 对应 UTC 00:07
    # 避开 00 分高峰，改为 07 分，通常会准时很多
    - cron: '7 0 * * *'
    
    # 2. 墨西哥时间 (CST) 08:13 推送 -> 对应 UTC 14:13
    # 避开 00 分高峰，改为 13 分
    - cron: '13 14 * * *'
    
  workflow_dispatch: # 保留手动点击按钮触发的功能

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 强制开启 Node 24 模式，彻底消灭黄色警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance

      - name: Run Daily Report Script
        env:
          # 注意：这里的变量名必须和你 GitHub Secrets 里填的一致
          LL_API_KEY: ${{ secrets.LLM_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
        run: python daily_report.py

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Notes/*.md
          # 即使没有新文件也顺利结束，不报错
          git commit -m "vault backup: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
