name: Daily Briefing Bot

on:
  schedule:
    # 墨西哥城时间 08:00 (CST) 对应 UTC 14:00
    - cron: '0 14 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz yfinance feedparser

      - name: Run Script
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: python daily_report.py
