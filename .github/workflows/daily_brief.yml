name: Daily Report Automation

on:
  schedule:
    # 墨西哥城当地时间早上 08:00 触发（对应 UTC 14:00）
    - cron: '0 14 * * *'
  workflow_dispatch: # 支持手动点击测试

# 🔑 核心修复点 1：强制给虚拟机注入最高的仓库写入权限，无视过期的 Token
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取全部历史，彻底防止分支冲突拒推

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests yfinance

    - name: Run Daily Report
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
      run: python daily_report.py

    # 🔑 核心修复点 2：防冲突、自对齐路径的自动推送模块
    - name: Commit & Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 🎯 核心修正：只添加标准的 Notes 文件夹
        git add Notes/
        
        git commit -m "vault backup: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git pull origin main --rebase || echo "No remote changes to rebase"
        git push origin main
